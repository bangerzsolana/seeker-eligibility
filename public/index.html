<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seeker Card Eligibility</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d24;
      color: #e0e0f0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: #c084fc;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .card {
      background: #13132e;
      border: 1px solid #2a2a5a;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: #0d0d24;
      border: 1px solid #3b3b7a;
      border-radius: 8px;
      color: #e0e0f0;
      font-family: inherit;
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #c084fc;
    }

    input[type="text"]::placeholder {
      color: #4b5563;
    }

    button {
      background: #7c3aed;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 0.65rem 1.4rem;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { background: #6d28d9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 1.8rem;
      text-align: center;
      display: none;
    }

    .result.show { display: block; }

    .verdict {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    .verdict.eligible { color: #4ade80; }
    .verdict.ineligible { color: #f472b6; }
    .verdict.error { color: #fb923c; }

    .wallet {
      font-size: 0.8rem;
      color: #6b7280;
      margin-bottom: 0.8rem;
      word-break: break-all;
    }

    .wallet span {
      color: #a78bfa;
    }

    .profile {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }

    .profile-pill {
      background: #1a1a3a;
      border: 1px solid #2a2a5a;
      border-radius: 20px;
      font-size: 0.78rem;
      padding: 0.25rem 0.75rem;
      color: #a78bfa;
    }

    .profile-pill.no-account {
      color: #6b7280;
      border-color: #1f1f3a;
    }

    .tournaments {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      justify-content: center;
    }

    .tag {
      background: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 6px;
      color: #818cf8;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
    }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid #3b3b7a;
      border-top-color: #c084fc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 1.5rem auto 0;
    }

    .spinner.show { display: block; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-sync {
      margin-top: 1.2rem;
      background: transparent;
      border: 1px solid #3b3b7a;
      border-radius: 8px;
      color: #6b7280;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      transition: border-color 0.2s, color 0.2s;
      display: none;
    }
    .btn-sync.show { display: inline-block; }
    .btn-sync:hover { border-color: #c084fc; color: #c084fc; }

    .share-section {
      display: none;
      margin-top: 1.5rem;
      text-align: center;
    }
    .share-section.show { display: block; }

    #shareCanvas {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #2a2a5a;
      display: block;
      margin: 0 auto 0.9rem;
    }

    .share-buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
    }

    .btn-share {
      background: #1e1b4b;
      border: 1px solid #4338ca;
      border-radius: 8px;
      color: #818cf8;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.5rem 1.1rem;
      transition: background 0.2s, color 0.2s;
    }
    .btn-share:hover { background: #2e2a6e; color: #c7d2fe; }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.72rem;
      color: #374151;
      text-align: center;
    }
  @font-face {
    font-family: 'LuckiestGuy';
    src: url('/LuckiestGuy-Regular.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  </style>
</head>
<body>
  <h1>SEEKER CARD</h1>
  <p class="subtitle">Check eligibility for the free Seeker card airdrop</p>

  <div class="card">
    <div class="input-row">
      <input
        type="text"
        id="domainInput"
        placeholder="yourname.skr"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="checkBtn" onclick="checkEligibility()">Check</button>
    </div>

    <div class="spinner" id="spinner"></div>

    <div class="result" id="result">
      <div class="verdict" id="verdict"></div>
      <div class="wallet" id="walletDisplay"></div>
      <div class="profile" id="profileDisplay"></div>
      <div class="tournaments" id="tournamentsDisplay"></div>
      <button class="btn-sync" id="syncBtn" onclick="checkEligibility()">⟳ Refresh</button>
    </div>

    <div class="share-section" id="shareSection">
      <canvas id="shareCanvas"></canvas>
      <div class="share-buttons">
        <button class="btn-share" onclick="copyShareImage(this)">Copy Image</button>
        <button class="btn-share" onclick="downloadShareImage()">Download</button>
      </div>
    </div>
  </div>

  <p class="footer">Players registered in Seeker tournaments #55–#59 are eligible.</p>

  <script>
    function buildProfile(data) {
      const parts = [];
      if (data.username) {
        parts.push(`<span class="profile-pill">@${data.username}</span>`);
      } else if (data.username === null && data.nftCount !== undefined) {
        parts.push(`<span class="profile-pill no-account">No GibMeme account</span>`);
      }
      if (data.nftCount > 0) {
        parts.push(`<span class="profile-pill">${data.nftCount} NFT${data.nftCount !== 1 ? 's' : ''} minted</span>`);
      }
      return parts.join('');
    }

    const input = document.getElementById('domainInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') checkEligibility(); });

    function truncateWallet(w) {
      return w.slice(0, 6) + '...' + w.slice(-4);
    }

    async function checkEligibility() {
      const raw = input.value.trim();
      if (!raw) return;

      const btn = document.getElementById('checkBtn');
      const syncBtn = document.getElementById('syncBtn');
      const spinner = document.getElementById('spinner');
      const resultEl = document.getElementById('result');
      const verdict = document.getElementById('verdict');
      const walletEl = document.getElementById('walletDisplay');
      const profileEl = document.getElementById('profileDisplay');
      const tournamentsEl = document.getElementById('tournamentsDisplay');

      btn.disabled = true;
      syncBtn.classList.remove('show');
      spinner.classList.add('show');
      resultEl.classList.remove('show');
      document.getElementById('shareSection').classList.remove('show');

      let domain = raw.toLowerCase();
      if (!domain.endsWith('.skr')) domain += '.skr';

      try {
        const res = await fetch(`/api/check/${encodeURIComponent(domain)}`);
        const data = await res.json();

        spinner.classList.remove('show');
        resultEl.classList.add('show');
        tournamentsEl.innerHTML = '';

        shareSection.classList.remove('show');
        if (data.error && !data.wallet) {
          verdict.textContent = '⚠ ' + data.error;
          verdict.className = 'verdict error';
          walletEl.innerHTML = '';
          profileEl.innerHTML = '';
        } else if (data.eligible) {
          verdict.textContent = '✅ ELIGIBLE';
          verdict.className = 'verdict eligible';
          walletEl.innerHTML = `Wallet: <span>${truncateWallet(data.wallet)}</span>`;
          profileEl.innerHTML = buildProfile(data);
          for (const t of data.tournaments) {
            const tag = document.createElement('span');
            tag.className = 'tag';
            tag.textContent = t;
            tournamentsEl.appendChild(tag);
          }
          buildShareImage(data.domain, data.username, 'eligible').catch(() => shareSection.classList.remove('show'));
        } else {
          verdict.textContent = '❌ NOT ELIGIBLE';
          verdict.className = 'verdict ineligible';
          walletEl.innerHTML = data.wallet
            ? `Wallet: <span>${truncateWallet(data.wallet)}</span>`
            : '';
          profileEl.innerHTML = data.wallet ? buildProfile(data) : '';
          if (data.wallet) {
            let state;
            if (!data.username) {
              state = 'no-account';
            } else if (data.nftCount >= 3) {
              state = 'ineligible-3plus';
            } else if (data.nftCount === 2) {
              state = 'ineligible-2';
            } else if (data.nftCount === 1) {
              state = 'ineligible-1';
            } else {
              state = 'ineligible-0';
            }
            buildShareImage(data.domain, data.username, state).catch(() => shareSection.classList.remove('show'));
          }
        }
      } catch (err) {
        spinner.classList.remove('show');
        resultEl.classList.add('show');
        verdict.textContent = '⚠ Request failed';
        verdict.className = 'verdict error';
        walletEl.innerHTML = '';
        tournamentsEl.innerHTML = '';
      }

      btn.disabled = false;
      if (resultEl.classList.contains('show')) syncBtn.classList.add('show');
    }

    // ── Share image ───────────────────────────────────────────
    const shareSection = document.getElementById('shareSection');
    const shareCanvas  = document.getElementById('shareCanvas');

    const STATE_CONFIG = {
      'eligible':   { bg: '/seeker-eligible-bg.png',   xPct: 0.07, yPct: 0.13, align: 'left', filename: 'seeker-eligible.png' },
      'ineligible-0':     { bg: '/seeker-ineligible-0-bg.png',     xPct: 0.54, yPct: 0.08, align: 'left', filename: 'seeker-ineligible.png' },
      'ineligible-1':     { bg: '/seeker-ineligible-1-bg.png',     xPct: 0.54, yPct: 0.08, align: 'left', filename: 'seeker-ineligible.png' },
      'ineligible-2':     { bg: '/seeker-ineligible-2-bg.png',     xPct: 0.54, yPct: 0.08, align: 'left', filename: 'seeker-ineligible.png' },
      'ineligible-3plus': { bg: '/seeker-ineligible-3plus-bg.png', xPct: 0.54, yPct: 0.08, align: 'left', filename: 'seeker-ineligible.png' },
      'no-account': { bg: ['/seeker-no-account-bg-0.png', '/seeker-no-account-bg-1.png', '/seeker-no-account-bg-2.png'], xPct: 0.08, yPct: 0.08, align: 'left', filename: 'seeker-no-account.png' },
    };

    let _currentState = 'eligible';

    async function buildShareImage(domain, username, state) {
      const cfg = STATE_CONFIG[state];
      _currentState = state;
      const label = domain.endsWith('.skr') ? domain : domain + '.skr';

      const bgSrc = Array.isArray(cfg.bg)
        ? cfg.bg[Math.floor(Math.random() * cfg.bg.length)]
        : cfg.bg;

      const img = new Image();
      img.src = bgSrc;
      await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });

      const W = img.naturalWidth;
      const H = img.naturalHeight;
      shareCanvas.width  = W;
      shareCanvas.height = H;

      const fontSize = Math.round(W * 0.055);
      await document.fonts.load(`${fontSize}px LuckiestGuy`);

      const ctx = shareCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, W, H);

      ctx.font         = `${fontSize}px LuckiestGuy`;
      ctx.textAlign    = cfg.align;
      ctx.textBaseline = 'top';
      ctx.shadowColor  = 'rgba(0,0,0,0.75)';
      ctx.shadowBlur   = Math.round(fontSize * 0.3);
      ctx.fillStyle    = '#ffffff';
      ctx.fillText(label, Math.round(W * cfg.xPct), Math.round(H * cfg.yPct));

      shareSection.classList.add('show');
    }

    async function copyShareImage(btn) {
      try {
        // Pass the blob as a Promise inside ClipboardItem so it resolves
        // within the user-gesture context — required by the Clipboard API.
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': new Promise(resolve => shareCanvas.toBlob(resolve, 'image/png')) })
        ]);
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy Image', 2000);
      } catch {
        alert('Copy failed — try Download instead.');
      }
    }

    function downloadShareImage() {
      const a = document.createElement('a');
      a.href = shareCanvas.toDataURL('image/png');
      a.download = STATE_CONFIG[_currentState].filename;
      a.click();
    }
  </script>
</body>
</html>
